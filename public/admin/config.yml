backend:
  name: git-gateway
  branch: main

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "projects"
    label: "Portfolio Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image" }
      - { label: "Video URL (YouTube/Vimeo Embed)", name: "videoUrl", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["YouTube", "Commercial", "Documentary", "Social Media"] }
      - { label: "Client Name", name: "client", widget: "string", required: false }

  - name: "services"
    label: "Services"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Icon Name (Lucide)", name: "icon", widget: "string" }

  - name: "testimonials"
    label: "Testimonials"
    folder: "src/content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Client Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Review Text", name: "text", widget: "text" }
      - { label: "Avatar Image", name: "avatar", widget: "image" }

  - name: "settings"
    label: "Site Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "General Settings"
        file: "src/content/settings/general.json"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Role", name: "role", widget: "string" }
          - { label: "Bio", name: "bio", widget: "text" }
          - { label: "Years of Experience", name: "yearsOfExperience", widget: "number" }
          - { label: "Profile Photo", name: "profilePhoto", widget: "image" }
          - { label: "Showreel URL", name: "showreelUrl", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string" }
